<body>
    <h1>integrando so recursos de interatividade</h1>
   
   
    <hr>
    <script>
    window.alert("Calculadora");

let num1 = parseFloat(window.prompt("Digite o primeiro número:"));
let num2 = parseFloat(window.prompt("Digite o segundo número:"));


let operacao = window.prompt(
  "Escolha a operação:\n+\n-\n*\n/"
);

let resultado;

if (operacao == "+") {
  resultado = num1 + num2;
} else if (operacao == "-") {
  resultado = num1 - num2;

  window.alert("Operação inválida!");
}


if (resultado !== undefined) {
  window.alert("O resultado é: " + resultado);
}




    </script>
